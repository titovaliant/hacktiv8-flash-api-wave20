<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Travel Buddy Tito</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <header class="hero-header">
      <h1>Travel AI Buddy Tito</h1>
      <p>Asisten perjalanan santai Anda</p>
      <p>untuk rekomendasi destinasi, aktivitas, dan rencana liburan.</p>

    </header>

    <div id="chat-box" class="chat-box"></div>

    <form id="chat-form" class="chat-form">
      <input type="text" id="user-input" placeholder="Ketik pesanmu..." autocomplete="off" required />
      <button type="submit">Send</button>
    </form>
  </div>
  <script src="script.js"></script>
</body>
</html>
